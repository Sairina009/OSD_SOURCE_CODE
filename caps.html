<script src="keyboard.min.js"></script>
<script>
   var currentPort = getCurrentPort();

    function getCurrentPort() {
        var urlParams = new URLSearchParams(window.location.search);
        var portParam = urlParams.get('port');
        return portParam ? parseInt(portParam, 10) : 1;
    }

    function setPort(newPort) {
        currentPort = newPort;
        window.location.href = 'port' + currentPort + '.php?port=' + currentPort;
    }

    function handleKeys(e) {
    
        var capsLockActive = e.getModifierState('CapsLock');

        if (e.ctrlKey) {
            if ((capsLockActive && e.key === 'ArrowUp') || (!capsLockActive && e.key === 'ArrowDown') && currentPort < 32) {
                setPort(currentPort + 1);
            } else if ((capsLockActive && e.key === 'ArrowDown') || (!capsLockActive && e.key === 'ArrowUp') && currentPort > 1) {
                setPort(currentPort - 1);
            }
        }
    }

    document.addEventListener('keydown', function(e) {
        handleKeys(e);
    });

window.addEventListener('keydown', function (event) {

    var capsLockActive = event.getModifierState("CapsLock");

    for (var i = 0; i <= 9; i++) {
        var numpadKey = 'Numpad' + i;
        if ((event.key === numpadKey || event.code === numpadKey) && capsLockActive) {
 
            window.location.href = 'port' + i + '.php';
            event.preventDefault();
        }
    }
});

 <script>
document.addEventListener('keydown', function (event) {
    if (event.getModifierState("CapsLock")) {
    
        var keyNumber = parseInt(event.key, 32);
        if (!isNaN(keyNumber) && keyNumber >= 1 && keyNumber <= 32) {
            window.location.href = 'port' + keyNumber + '.php';
        }
    }
});
</script>
